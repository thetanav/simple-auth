apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-auth-ingress
  annotations:
    # Assumes an nginx ingress controller. Adjust if using another controller.
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: simple-auth.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-service
                port:
                  number: 80
  # Uncomment and configure tls for production
  # tls:
  #   - hosts:
  #       - simple-auth.example.com
  #     secretName: simple-auth-tls
