apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: simple-auth:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: simple-auth-config
            - secretRef:
                name: simple-auth-secret
          ports:
            - containerPort: 3000
